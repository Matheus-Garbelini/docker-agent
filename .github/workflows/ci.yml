name: ci

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build-and-release:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.1 # v6.0.1

      - name: Set up Go
        uses: actions/setup-go@v6.2.0 # v6.2.0
        with:
          go-version: "1.26.0"
          cache: false

      - name: Lint
        uses: golangci/golangci-lint-action@v9.1.0 # v9.1.0
        with:
          version: v2.9

      - name: Lint GitHub Actions
        uses: raven-actions/actionlint@v2.1.1 # v2.1.1
        with:
          fail-on-error: true
          pyflakes: false

      - name: Install Task
        uses: go-task/setup-task@v1.0.0 # v1.0.0
        with:
          version: 3.x

      - name: Build
        run: task build

      # - name: Run tests
      #   run: |
      #     task test
      #     task test-binary

      - name: Get commit description
        id: commit
        run: |
          {
            echo "body<<EOF"
            git log -1 --pretty=%B | tail -n +3
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.2.2 # v2.2.2
        with:
          files: ./bin/docker-agent
          generate_release_notes: true
          body: ${{ steps.commit.outputs.body }}
